# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    
    update_rate: 120

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: position_controllers/JointGroupPositionController

    arm_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    
    joint_state_broadcaster:
          type: joint_state_broadcaster/JointStateBroadcaster


arm_controller:
  ros__parameters:
    joints:
      - shoulder_joint
      - upperArm_joint
      - foreArm_joint
      - wrist1_joint
      - wrist2_joint
      - wrist3_joint

    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

    # PID 对齐 IsaacLab actuator：stiffness=800, damping=40
    gains:
      shoulder_joint: {p: 800.0, i: 0.0, d: 40.0}
      upperArm_joint: {p: 800.0, i: 0.0, d: 40.0}
      foreArm_joint:  {p: 800.0, i: 0.0, d: 40.0}
      wrist1_joint:   {p: 800.0, i: 0.0, d: 40.0}
      wrist2_joint:   {p: 800.0, i: 0.0, d: 40.0}
      wrist3_joint:   {p: 800.0, i: 0.0, d: 40.0}

arm_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_joint
      - upperArm_joint
      - foreArm_joint
      - wrist1_joint
      - wrist2_joint
      - wrist3_joint

    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0
